name: Build and Push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, gd, mbstring, zip, pdo, pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --no-suggest

      - name: Create database and run migrations
        env:
          APP_KEY: base64:2fl+Ktvkfl+Fuz4Qp/A75G2RTiWVA/ZoKZvp6fiiM10=
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run tests
        run: php vendor/bin/phpunit --no-coverage

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print image URL
        run: echo "Image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Build and push portainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.portainer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-portainer:latest
          labels: ${{ steps.meta.outputs.labels }}
