version: "3.8"

services:
  at-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-busapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-busapp_secret}
      POSTGRES_DB: ${DB_DATABASE:-bus_ticketing}
      TZ: ${TZ:-America/Monterrey}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-busapp} -d ${DB_DATABASE:-bus_ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  at-app:
    image: ghcr.io/zegnhabi/at:latest
    environment:
      - APP_NAME=${APP_NAME:-BusTicketing}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=https://at.mvps.com.mx
      - DB_CONNECTION=pgsql
      - DB_HOST=at-db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-bus_ticketing}
      - DB_USERNAME=${DB_USERNAME:-busapp}
      - DB_PASSWORD=${DB_PASSWORD:-busapp_secret}
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=120
      - FILESYSTEM_DISK=local
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap:/var/www/html/bootstrap/cache
    depends_on:
      - at-db
    restart: unless-stopped
    networks:
      - backend
      - traefik_public
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.at-app.rule=Host(`at.mvps.com.mx`)
        - traefik.http.routers.at-app.service=at-app
        - traefik.http.routers.at-app.entrypoints=websecure
        - traefik.http.routers.at-app.tls=true
        - traefik.http.services.at-app.loadbalancer.server.port=80

volumes:
  pg_data:
  app_storage:
  app_bootstrap:

networks:
  backend:
  traefik_public:
    external: true
